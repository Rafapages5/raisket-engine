version: '3.8'

# Postgres local eliminado: n8n ahora usa Supabase como base de datos.
# Para desarrollo local, asegúrate de tener SUPABASE_DB_HOST y SUPABASE_DB_PASSWORD en tu .env

volumes:
  n8n_storage:

services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raisket_n8n_engine
    restart: always
    environment:
      # --- Base de datos: Supabase PostgreSQL ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${SUPABASE_DB_HOST}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=postgres
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false
      # --- Autenticación y configuración n8n ---
      - N8N_BASIC_AUTH_ACTIVE
      - N8N_BASIC_AUTH_USER
      - N8N_BASIC_AUTH_PASSWORD
      - N8N_ENCRYPTION_KEY
    ports:
      - "5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
