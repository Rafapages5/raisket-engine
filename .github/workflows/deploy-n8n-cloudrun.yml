name: Deploy n8n a Cloud Run
# Trigger: Manual verification of WIF permissions

on:
  push:
    branches:
      - main
    paths:
      - 'n8n/**'
      - '.github/workflows/deploy-n8n-cloudrun.yml'
  workflow_dispatch: # Permite lanzarlo manualmente desde GitHub

env:
  GCP_PROJECT_ID: raisket-engine
  GCP_REGION: us-central1
  SERVICE_NAME: raisket-n8n-engine
  REPO_NAME: raisket-docker # Artifact Registry repository (crearlo una vez en GCP)
  IMAGE_NAME: n8n-engine

jobs:
  deploy-n8n-cloudrun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Requerido para Workload Identity Federation

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Diagnóstico de Cuenta de Servicio
        run: |
          EXPECTED="github-actions-deployer@raisket-engine.iam.gserviceaccount.com"
          ACTUAL="${{ secrets.WIF_SERVICE_ACCOUNT }}"
          if [ "$ACTUAL" == "$EXPECTED" ]; then
            echo "✅ El secreto WIF_SERVICE_ACCOUNT coincide con la cuenta esperada."
          else
            echo "❌ ERROR: El secreto no coincide."
            echo "El secreto configurado tiene una longitud de ${#ACTUAL} caracteres."
            exit 1
          fi


      - name: Auth contra GCP (sin llaves via WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
          token_format: 'access_token'

      - name: Login a Artifact Registry con access token directo
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Construir y publicar imagen Docker
        id: build-image
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_URI ./n8n
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Desplegar a Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ steps.build-image.outputs.image_uri }}
          region: ${{ env.GCP_REGION }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --memory=1Gi
            --cpu=1
            --timeout=3600
            --port=5678
          env_vars: |
            DB_TYPE=postgresdb
            DB_POSTGRESDB_HOST=db.gwiyvnxlhbcipxpjhfvo.supabase.co
            DB_POSTGRESDB_PORT=5432
            DB_POSTGRESDB_DATABASE=postgres
            DB_POSTGRESDB_USER=postgres
            DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false
            N8N_BASIC_AUTH_ACTIVE=true
            DB_POSTGRESDB_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }}
            N8N_BASIC_AUTH_USER=${{ secrets.N8N_BASIC_AUTH_USER }}
            N8N_BASIC_AUTH_PASSWORD=${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
            N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
